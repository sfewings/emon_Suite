# dnsmasq configuration for Enchantee WiFi AP
# Copy to /etc/dnsmasq.d/enchantee.conf on the Raspberry Pi
#
# Assumptions:
#   - wlan0 is the WiFi AP interface
#   - Pi's AP static IP is 192.168.4.1 (configured in /etc/dhcpcd.conf)
#   - hostapd is already configured and running
#
# This config provides:
#   - DHCP addresses to WiFi AP clients
#   - DNS: resolves 'enchantee' to the Pi, forwards everything else upstream

# Listen only on the WiFi AP interface (avoids conflicts on eth0/other interfaces)
interface=wlan0
bind-interfaces

# DHCP: assign addresses to AP clients (100-200 range, 24 hour lease)
dhcp-range=192.168.4.100,192.168.4.200,255.255.255.0,24h

# Tell DHCP clients: default gateway is this Pi (for internet routing via NAT)
dhcp-option=option:router,192.168.4.1

# Tell DHCP clients: use this Pi for DNS
dhcp-option=option:dns-server,192.168.4.1

# Resolve 'enchantee' to the Pi's AP address so mobile clients can use
# friendly URLs like http://enchantee/display  http://enchantee/grafana
address=/enchantee/192.168.4.1

# Upstream DNS for all other queries (internet hostnames)
server=8.8.8.8
server=8.8.4.4

# Security: don't forward single-label queries (e.g. 'localhost') to upstream
domain-needed

# Security: don't forward RFC1918 reverse lookups to upstream
bogus-priv
