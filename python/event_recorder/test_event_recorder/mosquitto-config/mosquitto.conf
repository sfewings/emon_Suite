# Mosquitto MQTT Broker Configuration - Test Environment

# Allow anonymous connections (for testing only)
allow_anonymous true

# Default MQTT port
listener 1883

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/logs/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# Connection messages
connection_messages true
