<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Upload Photo - Event Recorder</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        /* Mobile-optimised upload page */
        body {
            background: var(--bg-secondary, #f5f6fa);
        }

        .upload-page {
            max-width: 600px;
            margin: 0 auto;
            padding: 0.75rem;
            display: flex;
            flex-direction: column;
            gap: 0.65rem;
        }

        .upload-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 12px;
            padding: 0.9rem 1rem;
            box-shadow: 0 4px 12px rgba(179,0,0,0.12);
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .upload-card label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.2rem;
            color: #333;
            font-size: 0.85rem;
        }

        .upload-card select,
        .upload-card input[type="text"],
        .upload-card textarea {
            width: 100%;
            padding: 0.6rem 0.75rem;
            border: 1px solid rgba(221,221,221,0.7);
            border-radius: 8px;
            font-size: 0.95rem;
            box-sizing: border-box;
            font-family: inherit;
            background: rgba(255, 255, 255, 0.70);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .upload-card select:focus,
        .upload-card input[type="text"]:focus,
        .upload-card textarea:focus {
            outline: none;
            border-color: #b30000;
            box-shadow: 0 0 0 3px rgba(179, 0, 0, 0.15);
        }

        .upload-card textarea {
            resize: none;
        }

        .field-group {
            display: flex;
            flex-direction: column;
        }

        /* Photo preview area — tappable */
        .upload-preview {
            width: 100%;
            height: 155px;
            background: #e9ecef;
            border: 2px dashed #ced4da;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            transition: border-color 0.2s;
            flex-shrink: 0;
        }

        .upload-preview:hover,
        .upload-preview:active {
            border-color: #b30000;
        }

        .upload-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
        }

        .upload-preview-placeholder {
            text-align: center;
            color: #888;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.4rem;
        }

        .preview-hint {
            font-size: 0.9rem;
            margin: 0;
        }

        /* Large touch-friendly upload button */
        .btn-large {
            width: 100%;
            padding: 1rem 1.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.65rem;
            touch-action: manipulation;
            transition: opacity 0.15s, transform 0.1s;
            -webkit-tap-highlight-color: transparent;
            flex-shrink: 0;
        }

        .btn-large:active:not(:disabled) {
            opacity: 0.85;
            transform: scale(0.98);
        }

        .btn-large:disabled {
            background: #ced4da !important;
            color: #6c757d;
            cursor: not-allowed;
        }

        .btn-upload {
            background-color: #2e7d32;
            color: white;
        }

        .btn-upload:hover:not(:disabled) {
            background-color: #1b5e20;
        }

        /* Result messages */
        .upload-result {
            display: none;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            font-weight: 500;
            text-align: center;
            font-size: 0.95rem;
        }

        .upload-result.success {
            display: block;
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .upload-result.error {
            display: block;
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        /* Header back link */
        .header-back {
            color: rgba(255, 255, 255, 0.85);
            text-decoration: none;
            font-size: 0.9rem;
            padding: 0.4rem 0.75rem;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 6px;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .header-back:hover {
            background: rgba(255, 255, 255, 0.15);
            color: white;
        }

        .no-recordings-note {
            font-size: 0.8rem;
            color: #888;
            margin: 0;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <h1><svg style="width:1em;height:1em;vertical-align:-0.125em;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round" viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg> Upload Photo</h1>
            <a href="/" class="header-back">← Dashboard</a>
        </div>
    </header>

    <div class="upload-page">

        <!-- Consolidated metadata card -->
        <div class="upload-card">
            <!-- Recording selector -->
            <div class="field-group">
                <label for="recordingSelect">Recording:</label>
                <select id="recordingSelect" onchange="onRecordingChange()">
                    <option value="">Loading recordings…</option>
                </select>
                <p class="no-recordings-note" id="noRecordingsNote" style="display:none;">
                    No active recordings found. Start a recording first.
                </p>
            </div>

            <!-- Blog post title -->
            <div class="field-group">
                <label for="postTitle">Blog Post Title:</label>
                <input type="text" id="postTitle" placeholder="Title of the blog post…">
            </div>

            <!-- Post description -->
            <div class="field-group">
                <label for="postDescription">Description:</label>
                <textarea id="postDescription"
                          placeholder="Describe this recording for the blog post…"
                          rows="2"></textarea>
            </div>

            <!-- Photo caption -->
            <div class="field-group">
                <label for="photoByline">Photo Caption:</label>
                <input type="text" id="photoByline" placeholder="Caption for this photo…">
            </div>
        </div>

        <!-- Tappable photo preview area -->
        <div class="upload-preview" id="previewArea"
             onclick="document.getElementById('photoInput').click()"
             title="Tap to select a photo">
            <div class="upload-preview-placeholder" id="previewPlaceholder">
                <svg style="width:3rem;height:3rem;opacity:0.45;fill:none;stroke:#b30000;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round" viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                <p class="preview-hint">Tap to select a photo</p>
            </div>
            <img id="previewImg" style="display:none;" alt="Selected photo">
        </div>

        <!-- Hidden file input — accepts images from camera roll or camera -->
        <input type="file" id="photoInput" accept="image/*" style="display:none">

        <!-- Upload button (disabled until photo selected) -->
        <button class="btn-large btn-upload" id="uploadBtn"
                onclick="uploadPhoto()" disabled>
            <svg style="width:1em;height:1em;vertical-align:-0.125em;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            Upload Photo
        </button>

        <!-- Result feedback -->
        <div class="upload-result" id="uploadResult"></div>

    </div>

    <script src="/static/upload.js"></script>
</body>
</html>
